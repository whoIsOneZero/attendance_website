<!doctype html>
<html lang="en">
  <head>
    <title>Admin - Spirit Surge</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
    />
  </head>
  <body>
    <div class="container">
      <div id="date-time"></div>

      <div class="form-container" style="max-width: 600px">
        <div class="header">
          <img
            src="{{ url_for('static', filename='spirit_surge_logo.png') }}"
            class="logo"
          />
          <div class="header-text">
            <h2 style="margin: 0">Admin Portal</h2>
            <a
              href="{{ url_for('index') }}"
              style="color: var(--text-muted); font-size: 0.8rem"
              >Back to Attendance</a
            >
          </div>
        </div>

        <div class="admin-section">
          <label for="exportDate">Select Date (GMT)</label>
          <div class="action-row">
            <input type="date" id="exportDate" class="admin-input" />
            <button id="downloadBtn" class="mini-btn success">
              Download Excel
            </button>
          </div>
        </div>

        <div class="stats-grid" style="margin-top: 2rem">
          <div class="stat-card">
            <span class="stat-label" id="statsLabel">Attendance for Today</span>
            <h2 id="totalToday">...</h2>

            <div id="breakdownContainer" class="breakdown-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const datePicker = document.getElementById("exportDate");
      const statsLabel = document.getElementById("statsLabel");
      const totalDisplay = document.getElementById("totalToday");
      const breakdownContainer = document.getElementById("breakdownContainer");

      // Function to fetch stats for a specific date
      async function updateDashboard(selectedDate) {
        totalDisplay.textContent = "...";
        breakdownContainer.innerHTML = ""; // Clear old stats

        try {
          const response = await fetch(
            `/api/stats-by-date?date=${selectedDate}`,
          );
          const data = await response.json();

          totalDisplay.textContent = data.total;

          // Populate Breakdown
          if (data.breakdown.length > 0) {
            data.breakdown.forEach((item) => {
              const row = document.createElement("div");
              row.className = "breakdown-row";
              row.innerHTML = `
                    <span>${item.type}</span>
                    <span class="breakdown-count">${item.count}</span>
                `;
              breakdownContainer.appendChild(row);
            });
          } else {
            breakdownContainer.innerHTML =
              "<p style='font-size:0.8rem; opacity:0.5;'>No records found.</p>";
          }

          const today = new Date().toISOString().split("T")[0];
          statsLabel.textContent =
            selectedDate === today
              ? "Attendance for Today"
              : `Attendance for ${selectedDate}`;
        } catch (err) {
          totalDisplay.textContent = "Error";
        }
      } // Event: Change Date
      datePicker.addEventListener("change", (e) => {
        updateDashboard(e.target.value);
      });

      // Event: Download Excel (Uses the currently selected date)
      document.getElementById("downloadBtn").addEventListener("click", () => {
        const date = datePicker.value;
        if (!date) return alert("Please select a date");
        window.location.href = `/export-attendance?date=${date}`;
      });

      // Init: Set today's date and load initial stats
      const todayStr = new Date().toISOString().split("T")[0];
      datePicker.value = todayStr;
      updateDashboard(todayStr);
    </script>
  </body>
</html>
